<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Brill HQ — Tasks</title>
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="512x512" href="favicon-512.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root {
    --bg: #ffffff;
    --sidebar: #f7f7f5;
    --text: #37352f;
    --muted: #787774;
    --faint: #9b9a97;
    --border: rgba(0, 0, 0, 0.08);
    --border-strong: rgba(0, 0, 0, 0.14);
    --hover: rgba(0, 0, 0, 0.04);
    --active: rgba(0, 0, 0, 0.06);
    --blue: #2383e2;
    --blue-soft: rgba(35, 131, 226, 0.10);
    --pill-gray-bg: #f1f1ef;   --pill-gray-tx: #57564f;
    --pill-green-bg: #dbeddb;  --pill-green-tx: #1c3829;
    --pill-yellow-bg: #fdecc8; --pill-yellow-tx: #402c1b;
    --pill-red-bg: #ffe2dd;    --pill-red-tx: #5d1715;
    --pill-blue-bg: #d3e5ef;   --pill-blue-tx: #183347;
    --pill-purple-bg: #e8deee; --pill-purple-tx: #412454;
    --radius: 6px;
    --shadow-card: rgba(15, 15, 15, 0.05) 0 0 0 1px, rgba(15, 15, 15, 0.1) 0 3px 6px, rgba(15, 15, 15, 0.2) 0 9px 24px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    display: flex;
  }

  /* ============ Sidebar ============ */
  .sidebar {
    width: 232px;
    min-width: 232px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    height: 100vh;
    position: sticky;
    top: 0;
    display: flex;
    flex-direction: column;
    padding: 12px 8px;
  }
  .sidebar-brand {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    padding: 6px 10px 14px;
    font-weight: 600;
    font-size: 14px;
  }
  .sidebar-brand img { width: 100%; height: auto; object-fit: contain; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    border: none;
    background: transparent;
    color: var(--muted);
    font: inherit;
    font-size: 14px;
    font-weight: 500;
    padding: 5px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    text-align: left;
    transition: background 0.1s;
  }
  .nav-item:hover { background: var(--hover); }
  .nav-item.current { background: var(--active); color: var(--text); font-weight: 600; }
  .nav-item .nav-icon { width: 18px; text-align: center; font-size: 15px; }
  .nav-item .nav-count {
    margin-left: auto;
    font-size: 12px;
    color: var(--faint);
    font-weight: 400;
  }
  .sidebar-footer {
    margin-top: auto;
    padding: 10px;
    font-size: 12px;
    color: var(--faint);
    border-top: 1px solid var(--border);
  }

  /* ============ Main ============ */
  .main {
    flex: 1;
    min-width: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .page {
    max-width: 820px;
    margin: 0 auto;
    padding: 56px 48px 120px;
    display: none;
  }
  .page.visible { display: block; }

  .page-title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .page-subtitle {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* ============ Tabs / controls ============ */
  .controls-row {
    display: flex;
    align-items: center;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 0;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .tab {
    border: none;
    background: transparent;
    font: inherit;
    font-size: 14px;
    color: var(--muted);
    padding: 6px 10px 8px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.1s;
  }
  .tab:hover { color: var(--text); }
  .tab.current { color: var(--text); font-weight: 600; border-bottom-color: var(--text); }
  .controls-spacer { flex: 1; }
  .search-input {
    border: none;
    background: transparent;
    font: inherit;
    font-size: 14px;
    color: var(--text);
    padding: 6px 8px;
    width: 180px;
    outline: none;
  }
  .search-input::placeholder { color: var(--faint); }
  .proj-search {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 4px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    margin-bottom: 24px;
    background: var(--bg);
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .proj-search:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
  .proj-search .magnifier { color: var(--faint); font-size: 15px; }
  .proj-search input {
    flex: 1;
    border: none;
    outline: none;
    font: inherit;
    font-size: 15px;
    padding: 9px 0;
    background: transparent;
    min-width: 0;
  }
  .proj-search input::placeholder { color: var(--faint); }

  /* ============ Quick add ============ */
  .quick-add {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 4px 4px 4px 12px;
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    margin-bottom: 24px;
    background: var(--bg);
    transition: box-shadow 0.15s, border-color 0.15s;
  }
  .quick-add:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-soft); }
  .quick-add .plus { color: var(--faint); font-size: 17px; }
  .quick-add input[type="text"] {
    flex: 1;
    border: none;
    outline: none;
    font: inherit;
    font-size: 15px;
    padding: 9px 0;
    background: transparent;
    min-width: 0;
  }
  .quick-add select {
    border: none;
    background: var(--sidebar);
    font: inherit;
    font-size: 13px;
    color: var(--muted);
    padding: 7px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    outline: none;
  }
  .quick-add .add-btn {
    border: none;
    background: var(--blue);
    color: #fff;
    font: inherit;
    font-size: 14px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: var(--radius);
    cursor: pointer;
  }
  .quick-add .add-btn:hover { background: #1a73cd; }

  /* ============ Sections & tasks ============ */
  .section { margin-bottom: 6px; }
  .section-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 6px;
    border-radius: var(--radius);
    cursor: pointer;
    user-select: none;
  }
  .section-header:hover { background: var(--hover); }
  .section-caret {
    color: var(--faint);
    font-size: 11px;
    width: 14px;
    transition: transform 0.12s;
  }
  .section.collapsed .section-caret { transform: rotate(-90deg); }
  .section-dot { width: 8px; height: 8px; border-radius: 50%; }
  .section-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .section-count { font-size: 12px; color: var(--faint); }
  .section.collapsed .section-body { display: none; }
  .section-body { padding: 2px 0 10px; }

  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 8px;
    border-radius: var(--radius);
    position: relative;
  }
  .task-row:hover { background: var(--hover); }

  .checkbox {
    width: 16px;
    height: 16px;
    min-width: 16px;
    border: 1.5px solid var(--border-strong);
    border-radius: 3px;
    cursor: pointer;
    margin-top: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    transition: background 0.1s, border-color 0.1s;
  }
  .checkbox:hover { border-color: var(--blue); }
  .checkbox.checked { background: var(--blue); border-color: var(--blue); }
  .checkbox.checked::after {
    content: "";
    width: 4px;
    height: 8px;
    border: solid #fff;
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg) translate(-1px, -1px);
  }

  .task-body { flex: 1; min-width: 0; }
  .task-text { word-break: break-word; }
  .task-row.done .task-text { color: var(--faint); text-decoration: line-through; }
  .task-meta {
    display: flex;
    gap: 10px;
    align-items: center;
    font-size: 12px;
    color: var(--faint);
    margin-top: 1px;
    flex-wrap: wrap;
  }
  .note-preview {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 360px;
  }

  .task-actions {
    display: flex;
    gap: 2px;
    opacity: 0;
    transition: opacity 0.1s;
  }
  .task-row:hover .task-actions, .ptodo-row:hover .task-actions { opacity: 1; }
  .icon-btn {
    border: none;
    background: transparent;
    color: var(--faint);
    font: inherit;
    font-size: 12px;
    padding: 3px 7px;
    border-radius: 4px;
    cursor: pointer;
    white-space: nowrap;
  }
  .icon-btn:hover { background: var(--active); color: var(--text); }
  .icon-btn.danger:hover { color: #c4554d; background: var(--pill-red-bg); }

  .task-edit-input, .notes-area {
    width: 100%;
    font: inherit;
    font-size: 15px;
    border: 1px solid var(--blue);
    border-radius: var(--radius);
    padding: 6px 8px;
    outline: none;
    box-shadow: 0 0 0 3px var(--blue-soft);
  }
  .notes-area {
    font-size: 13px;
    color: var(--muted);
    border: 1px solid var(--border);
    box-shadow: none;
    background: var(--sidebar);
    margin-top: 6px;
    resize: vertical;
    min-height: 60px;
  }
  .notes-area:focus { border-color: var(--blue); }

  .empty-note {
    color: var(--faint);
    font-size: 14px;
    padding: 24px 8px;
    text-align: center;
  }

  /* ============ Pills ============ */
  .pill {
    display: inline-flex;
    align-items: center;
    font-size: 12px;
    font-weight: 500;
    padding: 1px 8px;
    border-radius: 4px;
    white-space: nowrap;
    line-height: 1.5;
  }
  .pill.clickable { cursor: pointer; border: none; font: inherit; font-size: 12px; font-weight: 500; }
  .pill-gray   { background: var(--pill-gray-bg);   color: var(--pill-gray-tx); }
  .pill-green  { background: var(--pill-green-bg);  color: var(--pill-green-tx); }
  .pill-yellow { background: var(--pill-yellow-bg); color: var(--pill-yellow-tx); }
  .pill-red    { background: var(--pill-red-bg);    color: var(--pill-red-tx); }
  .pill-blue   { background: var(--pill-blue-bg);   color: var(--pill-blue-tx); }
  .pill-purple { background: var(--pill-purple-bg); color: var(--pill-purple-tx); }

  /* ============ Projects list ============ */
  .new-btn {
    border: 1px solid var(--border-strong);
    background: var(--bg);
    color: var(--text);
    font: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: var(--radius);
    cursor: pointer;
  }
  .new-btn:hover { background: var(--hover); }
  .new-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .new-btn.primary:hover { background: #1a73cd; }

  .project-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 10px 10px;
    border-radius: var(--radius);
    cursor: pointer;
    border-bottom: 1px solid var(--border);
  }
  .project-row:hover { background: var(--hover); }
  .project-row .p-icon { font-size: 16px; }
  .project-row .p-name {
    font-weight: 600;
    font-size: 15px;
    flex: 0 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .project-row .p-name.untitled { color: var(--faint); font-weight: 500; }
  .p-progress {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 90px;
  }
  .p-bar {
    flex: 1;
    height: 4px;
    background: var(--pill-gray-bg);
    border-radius: 2px;
    overflow: hidden;
    max-width: 160px;
  }
  .p-bar-fill { height: 100%; background: var(--blue); border-radius: 2px; }
  .p-count { font-size: 12px; color: var(--faint); white-space: nowrap; }
  .p-due { font-size: 12px; color: var(--faint); white-space: nowrap; }

  /* ============ Project detail ============ */
  .breadcrumb {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 22px;
  }
  .breadcrumb button {
    border: none;
    background: transparent;
    font: inherit;
    font-size: 13px;
    color: var(--muted);
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
  }
  .breadcrumb button:hover { background: var(--hover); color: var(--text); }
  .breadcrumb .crumb-sep { color: var(--faint); }

  .detail-title-input {
    width: 100%;
    border: none;
    outline: none;
    font: inherit;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
    padding: 0;
    margin-bottom: 14px;
    background: transparent;
  }
  .detail-title-input::placeholder { color: #d4d2cc; }

  .props {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-bottom: 8px;
  }
  .prop-row {
    display: flex;
    align-items: center;
    min-height: 32px;
    gap: 12px;
  }
  .prop-label {
    width: 120px;
    min-width: 120px;
    font-size: 13px;
    color: var(--faint);
    display: flex;
    gap: 7px;
    align-items: center;
  }
  .prop-value { flex: 1; display: flex; align-items: center; gap: 8px; }
  .props-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    border: none;
    background: transparent;
    font: inherit;
    font-size: 13px;
    color: var(--faint);
    padding: 4px 6px;
    margin: 0 -6px 8px;
    border-radius: var(--radius);
    cursor: pointer;
  }
  .props-toggle:hover { background: var(--hover); color: var(--muted); }
  .menu-wrap { position: relative; }
  .menu {
    position: absolute;
    right: 0;
    top: 100%;
    margin-top: 4px;
    background: var(--bg);
    border: 1px solid var(--border-strong);
    border-radius: 8px;
    box-shadow: var(--shadow-card);
    padding: 4px;
    display: none;
    z-index: 30;
    min-width: 170px;
  }
  .menu.open { display: block; }
  .menu button {
    display: block;
    width: 100%;
    text-align: left;
    border: none;
    background: transparent;
    font: inherit;
    font-size: 13px;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--text);
  }
  .menu button:hover { background: var(--hover); }
  .menu button.danger { color: #eb5757; }
  .checkbox.select-box { border-radius: 4px; }
  .checkbox.select-box.checked { background: #eb5757; border-color: #eb5757; }
  .delete-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    border: 1px solid #f0b8b8;
    background: #fdf0ef;
    border-radius: 8px;
    font-size: 13px;
    color: #a33;
  }
  .delete-bar .spacer { flex: 1; }
  .new-btn.danger-solid { background: #eb5757; border-color: #eb5757; color: #fff; }
  .new-btn.danger-solid:hover { background: #d64545; }
  .detail-head { display: flex; align-items: flex-start; gap: 8px; }
  .detail-head .detail-title-input { flex: 1; min-width: 0; }
  .props-toggle .props-caret { display: inline-block; font-size: 11px; transition: transform 0.15s; transform: rotate(-90deg); }
  .props-toggle.open .props-caret { transform: none; }
  .prop-value select, .prop-value input[type="date"] {
    border: none;
    background: transparent;
    font: inherit;
    font-size: 14px;
    color: var(--text);
    padding: 4px 6px;
    border-radius: 4px;
    cursor: pointer;
    outline: none;
  }
  .prop-value select:hover, .prop-value input[type="date"]:hover { background: var(--hover); }

  .detail-notes {
    width: 100%;
    border: none;
    outline: none;
    font: inherit;
    font-size: 14px;
    color: var(--muted);
    resize: none;
    background: transparent;
    padding: 6px 0;
    margin-bottom: 10px;
    min-height: 32px;
  }
  .detail-notes::placeholder { color: var(--faint); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 14px 0 20px; }

  .detail-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .detail-toolbar .controls-spacer { flex: 1; }

  .ptodo-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 7px 8px;
    border-radius: var(--radius);
  }
  .ptodo-row:hover { background: var(--hover); }
  .ptodo-row.done .task-text { color: var(--faint); text-decoration: line-through; }

  .danger-zone { margin-top: 40px; }
  .danger-link {
    border: none;
    background: transparent;
    font: inherit;
    font-size: 13px;
    color: var(--faint);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 4px;
  }
  .danger-link:hover { color: #c4554d; background: var(--pill-red-bg); }

  /* ============ Personal: second sidebar + page ============ */
  .entries-sidebar {
    display: none;
    width: 250px;
    min-width: 220px;
    height: 100vh;
    position: sticky;
    top: 0;
    background: #fbfbfa;
    border-right: 1px solid var(--border);
    flex-direction: column;
  }
  .entries-sidebar.open { display: flex; }
  .entries-sidebar-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 12px 8px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .entries-sidebar-list { flex: 1; overflow-y: auto; padding: 0 8px 16px; }
  .psb-filters { display: flex; gap: 2px; padding: 0 12px 10px; flex-wrap: wrap; }
  .psb-tab {
    border: none;
    background: transparent;
    font: inherit;
    font-size: 11.5px;
    color: var(--faint);
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  .psb-tab:hover { background: var(--hover); color: var(--text); }
  .psb-tab.current { background: var(--active); color: var(--text); font-weight: 600; }
  .psb-group {
    font-size: 11px;
    font-weight: 600;
    color: var(--faint);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 12px 10px 4px;
  }

  /* ============ Projects overview (card grid) ============ */
  .page.page-wide { max-width: 1240px; }
  .ov-group {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin: 22px 2px 10px;
  }
  .ov-group:first-of-type { margin-top: 4px; }
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
    align-items: start;
  }
  .proj-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px 10px;
    background: var(--bg);
    transition: box-shadow 0.12s, border-color 0.12s;
  }
  .proj-card:hover { box-shadow: rgba(15, 15, 15, 0.07) 0 2px 10px; border-color: var(--border-strong); }
  .proj-card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .proj-card-name {
    font-weight: 600;
    font-size: 14.5px;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: pointer;
  }
  .proj-card-name:hover { color: var(--blue); }
  .proj-card-name.untitled { color: var(--faint); font-weight: 500; }
  .proj-card-progress { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .proj-card-todos { display: flex; flex-direction: column; gap: 1px; }
  .card-todo {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    font-size: 13px;
    line-height: 1.4;
    padding: 3px 4px;
    border-radius: 4px;
  }
  .card-todo:hover { background: var(--hover); }
  .card-todo .checkbox { width: 14px; height: 14px; min-width: 14px; margin-top: 2px; }
  .card-todo .checkbox.checked::after { width: 3px; height: 7px; }
  .card-todo-text { flex: 1; min-width: 0; word-break: break-word; cursor: pointer; }
  .card-todo-text:hover { color: var(--blue); }
  .card-note-flag { font-size: 11px; opacity: 0.7; }

<script>
/* =====================================================================
   Brill HQ v2 — Notion-style redesign.
   Same backend as todo-app.html: /api/state, /api/add-task,
   todo-inbox.json, todo-data.js. Only writes the state keys it manages
   (completed/edits/notes/deleted/projectItems); the server merge keeps
   personalItems / project2Groups etc. intact.
   ===================================================================== */

const STATE_URL = "/api/state";
const INBOX_URL = "todo-inbox.json";
const INBOX_POLL_MS = 10000;

const UI_VIEW_KEY = "v2-last-view";
const UI_PROJECT_KEY = "v2-last-project";
const UI_COLLAPSED_KEY = "v2-collapsed-sections";

const PRIORITY_CONFIG = {
  urgent: { title: "Urgent", color: "#eb5757", order: 0 },
  high:   { title: "High",   color: "#f2994a", order: 1 },
  normal: { title: "Normal", color: "#2383e2", order: 2 },
  low:    { title: "Low",    color: "#9b9a97", order: 3 }
};
const URGENCY_PILL = { low: "pill-gray", medium: "pill-yellow", high: "pill-red" };
const URGENCY_NEXT = { low: "medium", medium: "high", high: "low" };
const STATUS_PILL = { Active: "pill-green", Paused: "pill-yellow", Done: "pill-gray" };

let completed = {};
let edits = {};
let notes = {};
let deleted = {};
let routedInbox = {};
let projects = [];
let inboxItems = [];
let personalItems = [];
let selectedEntryIndex = 0;

let view = "tasks";            // tasks | projects | detail
let taskFilter = "active";     // active | completed | all
let searchQuery = "";
let projectSearchQuery = "";
let statusFilter = "Active";
let showArchivedNotes = false;
let activeProjectId = null;
let projectsOverview = localStorage.getItem("v2-projects-overview") === "true";
let detailPropsOpen = false;
let editingTaskKey = null;
let editingPtodoId = null;
let deleteMode = null;          // null | "tasks" | "ptodos"
let deleteSelection = new Set();
let expandedNotes = new Set();
let expandedPtodoNotes = new Set();
let pickerKeys = [];
let remoteLoaded = false;
let saveTimer = null;
let dirty = false;

let collapsedSections = new Set();
try { collapsedSections = new Set(JSON.parse(localStorage.getItem(UI_COLLAPSED_KEY)) || []); } catch (e) {}

/* ---------- helpers ---------- */

function escHtml(s) {
  return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function uid(prefix) {
  return prefix + "_" + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function taskKey(sectionId, idx) {
  return sectionId + "::" + idx;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove("show"), 1900);
}

function normalizeUrgency(value) {
  const u = String(value || "").toLowerCase();
  return ["low", "medium", "high"].includes(u) ? u : "medium";
}

function normalizeTodo(t) {
  if (typeof t === "string") {
    const text = t.trim();
    return text ? { id: uid("pt"), text, completed: false, urgency: "medium", createdAt: new Date().toISOString(), notes: "" } : null;
  }
  if (!t || typeof t !== "object") return null;
  const text = String(t.text || t.task || "").trim();
  if (!text) return null;
  return {
    id: String(t.id || uid("pt")),
    text,
    completed: Boolean(t.completed),
    urgency: normalizeUrgency(t.urgency),
    createdAt: t.createdAt || t.added || "",
    notes: typeof t.notes === "string" ? t.notes : ""
  };
}

function normalizeProject(p) {
  return {
    ...p,
    id: String(p.id || uid("p")),
    name: typeof p.name === "string" ? p.name : "",
    status: ["Active", "Paused", "Done"].includes(p.status) ? p.status : "Active",
    due: typeof p.due === "string" ? p.due : "",
    notes: typeof p.notes === "string" ? p.notes : "",
    personal: Boolean(p.personal),
    ai: Boolean(p.ai),
    archived: Boolean(p.archived),
    isTemplate: Boolean(p.isTemplate),
    todos: Array.isArray(p.todos) ? p.todos.map(normalizeTodo).filter(Boolean) : []
  };
}

function findProject(id) {
  return projects.find(p => String(p.id) === String(id));
}

function touchProject(p) {
  p.updatedAt = new Date().toISOString();
}

/* ---------- persistence ---------- */

async function loadRemoteState() {
  try {
    const res = await fetch(STATE_URL + "?t=" + Date.now());
    if (!res.ok) return;
    const data = await res.json();
    completed = data.completed && typeof data.completed === "object" ? data.completed : {};
    edits = data.edits && typeof data.edits === "object" ? data.edits : {};
    notes = data.notes && typeof data.notes === "object" ? data.notes : {};
    deleted = data.deleted && typeof data.deleted === "object" ? data.deleted : {};
    routedInbox = data.routedInbox && typeof data.routedInbox === "object" ? data.routedInbox : {};
    projects = Array.isArray(data.projectItems) ? data.projectItems.map(normalizeProject) : [];
    personalItems = Array.isArray(data.personalItems) ? data.personalItems.filter(i => i && typeof i === "object") : [];
    remoteLoaded = true;
  } catch (e) {
    remoteLoaded = false;
    showToast("Couldn't reach the server — read-only view");
  }
}

function savePayload() {
  return JSON.stringify({ completed, edits, notes, deleted, routedInbox, projectItems: projects, personalItems });
}

function queueSave() {
  if (!remoteLoaded) return;
  dirty = true;
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    dirty = false;
    try {
      const res = await fetch(STATE_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: savePayload()
      });
      if (!res.ok) { dirty = true; showToast("Save failed — server error"); }
    } catch (e) {
      dirty = true;
      showToast("Save failed — server offline");
    }
  }, 350);
}

/* Hidden tabs throttle timers, so the debounced save may never fire before
   the page goes away — flush pending changes immediately on hide/close. */
function flushSave() {
  if (!remoteLoaded || !dirty) return;
  clearTimeout(saveTimer);
  dirty = false;
  navigator.sendBeacon(STATE_URL, new Blob([savePayload()], { type: "application/json" }));
}

window.addEventListener("pagehide", flushSave);
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") flushSave();
});

async function loadInbox() {
  try {
    const res = await fetch(INBOX_URL + "?t=" + Date.now());
    const data = await res.json();
    if (Array.isArray(data)) inboxItems = data;
  } catch (e) { /* keep what we have */ }
}

/* Inbox items that carry a "project" field (e.g. added by AI through the API)
   get filed straight into that project instead of piling up in the inbox. */
const ROUTE_URGENCY = { urgent: "high", high: "high", normal: "medium", low: "low" };

function routeInboxItems() {
  if (!remoteLoaded) return false;
  let routedCount = 0;
  inboxItems.forEach(item => {
    if (typeof item !== "object" || !item.project || !item.task) return;
    const routeKey = item.task + "|" + (item.added || "");
    if (routedInbox[routeKey]) return;
    const wanted = item.project.trim().toLowerCase();
    let p = projects.find(x => !x.isTemplate && x.ai && (x.name || "").trim().toLowerCase() === wanted);
    if (!p) {
      p = {
        id: uid("p"), name: item.project.trim(), status: "Active", owner: "", due: "", notes: "",
        personal: false, ai: true, todos: [], isTemplate: false,
        createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
      };
      projects.unshift(p);
    }
    p.todos.unshift({
      id: uid("pt"), text: item.task, completed: false,
      urgency: ROUTE_URGENCY[item.priority] || "medium",
      createdAt: new Date().toISOString(), notes: item.notes || ""
    });
    touchProject(p);
    routedInbox[routeKey] = true;
    routedCount++;
  });
  if (routedCount) {
    queueSave();
    showToast(`Filed ${routedCount} new to-do${routedCount === 1 ? "" : "s"} into projects`);
  }
  return routedCount > 0;
}

/* ---------- sections (inbox + static data) ---------- */

function getAllSections() {
  const sections = [];
  if (inboxItems.length > 0) {
    const grouped = {};
    inboxItems.forEach(item => {
      if (typeof item === "object" && item.project) return; // filed into a project, not the inbox
      const task = typeof item === "string" ? item : item.task || "";
      const priority = (typeof item === "object" && item.priority) ? item.priority : "normal";
      const added = (typeof item === "object" && item.added) ? item.added : "";
      if (!grouped[priority]) grouped[priority] = [];
      grouped[priority].push({ task, added });
    });
    Object.keys(grouped)
      .sort((a, b) => (PRIORITY_CONFIG[a]?.order ?? 2) - (PRIORITY_CONFIG[b]?.order ?? 2))
      .forEach(priority => {
        const cfg = PRIORITY_CONFIG[priority] || PRIORITY_CONFIG.normal;
        sections.push({
          id: "inbox-" + priority,
          title: "Inbox — " + cfg.title,
          color: cfg.color,
          items: grouped[priority].map(i => i.task),
          dates: grouped[priority].map(i => i.added)
        });
      });
  }
  sections.push(...(typeof TODO_DATA !== "undefined" ? TODO_DATA : []));
  return sections;
}

/* ---------- rendering: nav & stats ---------- */

function renderNav() {
  document.getElementById("nav-tasks").classList.toggle("current", view === "tasks");
  document.getElementById("nav-projects").classList.toggle("current", view === "projects");
  document.getElementById("nav-personal").classList.toggle("current", view === "personal");

  let total = 0, done = 0;
  getAllSections().forEach(section => {
    section.items.forEach((_, i) => {
      const key = taskKey(section.id, i);
      if (deleted[key]) return;
      total++;
      if (completed[key]) done++;
    });
  });
  document.getElementById("nav-tasks-count").textContent = total - done;
  document.getElementById("nav-projects-count").textContent =
    projects.filter(p => !p.isTemplate && (p.status || "Active") === "Active").length;
  document.getElementById("nav-personal-count").textContent = personalItems.filter(i => !i.archived).length;
  document.getElementById("sidebar-stats").textContent = `${total - done} open · ${done} done`;
  document.getElementById("tasks-subtitle").textContent =
    `${total - done} open task${total - done === 1 ? "" : "s"} · ${done} completed`;
}

function setView(next) {
  deleteMode = null;
  deleteSelection = new Set();
  view = next === "detail" ? "projects" : next;
  document.getElementById("page-tasks").classList.toggle("visible", view === "tasks");
  document.getElementById("page-personal").classList.toggle("visible", view === "personal");
  document.getElementById("entries-sidebar").classList.toggle("open", view === "personal");
  document.getElementById("page-project-detail").classList.toggle("visible", view === "projects");
  document.getElementById("projects-sidebar").classList.toggle("open", view === "projects");
  try {
    localStorage.setItem(UI_VIEW_KEY, view);
    if (view === "projects" && activeProjectId) localStorage.setItem(UI_PROJECT_KEY, activeProjectId);
  } catch (e) {}
  render();
}

/* ---------- rendering: tasks ---------- */

function taskRowHtml(section, idx) {
  const key = taskKey(section.id, idx);
  const isDone = !!completed[key];
  const text = edits[key] || section.items[idx];
  const date = section.dates ? (section.dates[idx] || "") : "";
  const noteText = notes[key] || "";
  const hasNotes = !!noteText.trim();
  const notesOpen = expandedNotes.has(key);

  let body;
  if (editingTaskKey === key) {
    body = `<input class="task-edit-input" id="edit-input" value="${escHtml(text)}" data-key="${escHtml(key)}">`;
  } else {
    const metaBits = [];
    if (date) metaBits.push(`<span>${escHtml(date)}</span>`);
    if (hasNotes && !notesOpen) metaBits.push(`<span class="note-preview">&#128221; ${escHtml(noteText.split("\n")[0].slice(0, 80))}</span>`);
    body = `<span class="task-text">${escHtml(text)}</span>` +
      (metaBits.length ? `<div class="task-meta">${metaBits.join("")}</div>` : "") +
      (notesOpen ? `<textarea class="notes-area" data-role="task-notes" data-key="${escHtml(key)}" placeholder="Notes&hellip;">${escHtml(noteText)}</textarea>` : "");
  }

  if (deleteMode === "tasks") {
    const marked = deleteSelection.has(key);
    return `<div class="task-row ${isDone ? "done" : ""}">
      <div class="checkbox select-box ${marked ? "checked" : ""}" data-action="toggle-select" data-key="${escHtml(key)}"></div>
      <div class="task-body"><span class="task-text">${escHtml(text)}</span></div>
    </div>`;
  }

  return `<div class="task-row ${isDone ? "done" : ""}">
    <div class="checkbox ${isDone ? "checked" : ""}" data-action="toggle-task" data-key="${escHtml(key)}"></div>
    <div class="task-body">${body}</div>
    <div class="task-actions">
      <button class="icon-btn" data-action="toggle-notes" data-key="${escHtml(key)}">${notesOpen ? "Hide note" : (hasNotes ? "Note" : "+ Note")}</button>
      <button class="icon-btn" data-action="assign-project" data-key="${escHtml(key)}">&rarr; Project</button>
      <button class="icon-btn" data-action="edit-task" data-key="${escHtml(key)}">Edit</button>
    </div>
  </div>`;
}

function deleteBarHtml() {
  const n = deleteSelection.size;
  return `<div class="delete-bar">
    <span><b>${n}</b> selected &mdash; tap the boxes to choose what to delete</span>
    <div class="spacer"></div>
    <button class="new-btn" data-action="cancel-delete-mode">Cancel</button>
    <button class="new-btn danger-solid" data-action="confirm-bulk-delete">Delete selected</button>
  </div>`;
}

function renderTasks() {
  const container = document.getElementById("sections-container");
  const q = searchQuery.trim().toLowerCase();
  let html = "";
  let shown = 0;

  getAllSections().forEach(section => {
    const rows = [];
    section.items.forEach((item, idx) => {
      const key = taskKey(section.id, idx);
      if (deleted[key]) return;
      const isDone = !!completed[key];
      if (taskFilter === "active" && isDone) return;
      if (taskFilter === "completed" && !isDone) return;
      const text = (edits[key] || item || "").toLowerCase();
      const note = (notes[key] || "").toLowerCase();
      if (q && !text.includes(q) && !note.includes(q)) return;
      rows.push(taskRowHtml(section, idx));
    });
    if (!rows.length) return;
    shown += rows.length;
    const isCollapsed = collapsedSections.has(section.id) && !q;
    html += `<div class="section ${isCollapsed ? "collapsed" : ""}" data-section-id="${escHtml(section.id)}">
      <div class="section-header" data-action="toggle-section" data-section="${escHtml(section.id)}">
        <span class="section-caret">&#9662;</span>
        <span class="section-dot" style="background:${escHtml(section.color || "#9b9a97")}"></span>
        <span class="section-title">${escHtml(section.title)}</span>
        <span class="section-count">${rows.length}</span>
      </div>
      <div class="section-body">${rows.join("")}</div>
    </div>`;
  });

  if (!shown) {
    html = `<div class="empty-note">${q ? "No tasks match your search." :
      taskFilter === "completed" ? "Nothing completed yet." : "All clear &mdash; no open tasks. &#127881;"}</div>`;
  }
  container.innerHTML = (deleteMode === "tasks" ? deleteBarHtml() : "") + html;

  if (editingTaskKey) {
    const input = document.getElementById("edit-input");
    if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
  }
}

/* ---------- rendering: projects ---------- */

function projectStats(p) {
  const total = p.todos.length;
  const done = p.todos.filter(t => t.completed).length;
  return { total, done };
}

function visibleProjects() {
  return projects
    .filter(p => !p.isTemplate)
    // Archived projects only appear under the "Archived" tab; every other
    // view (Active/Paused/Done/All) hides them.
    .filter(p => statusFilter === "Archived" ? p.archived : !p.archived)
    .filter(p => statusFilter === "all" || statusFilter === "Archived" || (p.status || "Active") === statusFilter);
}

function renderProjectsSidebar() {
  const list = document.getElementById("projects-list");
  const all = projects.filter(p => !p.isTemplate);
  const visible = visibleProjects();

  document.getElementById("projects-sidebar-count").textContent = all.length ? `· ${all.length}` : "";
  document.querySelectorAll(".psb-tab").forEach(el =>
    el.classList.toggle("current", el.dataset.status === statusFilter));

  const overviewHtml = `<div class="entry-item ${projectsOverview ? "selected" : ""}" data-action="overview">
    <div class="entry-item-title">&#8862; Overview</div>
  </div>`;

  if (!visible.length) {
    list.innerHTML = overviewHtml + `<div class="empty-note">No ${statusFilter === "all" ? "" : statusFilter.toLowerCase() + " "}projects.</div>`;
    return;
  }

  const groups = [
    { title: "AI Projects", items: visible.filter(p => p.ai) },
    { title: "Work", items: visible.filter(p => !p.personal && !p.ai) },
    { title: "Personal", items: visible.filter(p => p.personal && !p.ai) }
  ].filter(g => g.items.length);

  list.innerHTML = overviewHtml + groups.map(g => `
    <div class="psb-group">${g.title}</div>
    ${g.items.map(p => {
      const { total, done } = projectStats(p);
      return `<div class="entry-item ${!projectsOverview && String(p.id) === String(activeProjectId) ? "selected" : ""}" data-action="open-project" data-id="${escHtml(p.id)}">
        <div class="entry-item-title ${p.name ? "" : "untitled"}">${escHtml(p.name || "Untitled")}</div>
        <div class="entry-item-date">${escHtml(p.status || "Active")}${total ? ` &middot; ${done}/${total} done` : ""}</div>
      </div>`;
    }).join("")}`).join("");
}

function setOverview(on) {
  projectsOverview = on;
  try { localStorage.setItem("v2-projects-overview", on ? "true" : "false"); } catch (e) {}
}

function formatDue(iso) {
  const d = new Date(iso + "T00:00:00");
  if (Number.isNaN(d.getTime())) return iso;
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric" });
}

const CARD_TODO_LIMIT = 6;

function projectCardHtml(p, q) {
  const { total, done } = projectStats(p);
  const pct = total ? Math.round((done / total) * 100) : 0;
  const open = p.todos.filter(t => !t.completed)
    .sort((a, b) => ({ high: 0, medium: 1, low: 2 }[a.urgency] - { high: 0, medium: 1, low: 2 }[b.urgency]));
  let pool = open;
  if (q) {
    const matches = open.filter(t => (t.text || "").toLowerCase().includes(q) || (t.notes || "").toLowerCase().includes(q));
    if (matches.length) pool = matches;
  }
  const shown = pool.slice(0, CARD_TODO_LIMIT);

  const todosHtml = shown.map(t => {
    const hasNotes = !!(t.notes && t.notes.trim());
    return `
    <div class="card-todo">
      <div class="checkbox" data-action="toggle-card-todo" data-pid="${escHtml(p.id)}" data-tid="${escHtml(t.id)}" title="Mark done"></div>
      <span class="card-todo-text" data-action="open-card-todo" data-pid="${escHtml(p.id)}" data-tid="${escHtml(t.id)}" title="Open for notes">${escHtml(t.text)}${hasNotes ? ` <span class="card-note-flag">&#128221;</span>` : ""}</span>
    </div>`;
  }).join("");

  return `<div class="proj-card">
    <div class="proj-card-head">
      <span class="proj-card-name ${p.name ? "" : "untitled"}" data-action="open-project" data-id="${escHtml(p.id)}">${escHtml(p.name || "Untitled")}</span>
      <span class="pill ${STATUS_PILL[p.status] || "pill-gray"}">${escHtml(p.status || "Active")}</span>
    </div>
    <div class="proj-card-progress">
      <div class="p-bar"><div class="p-bar-fill" style="width:${pct}%"></div></div>
      <span class="p-count">${done}/${total}</span>
      ${p.due ? `<span class="p-due">&#128197; ${escHtml(formatDue(p.due))}</span>` : ""}
    </div>
    <div class="proj-card-todos">
      ${todosHtml || `<div class="card-empty">${total ? "All done &#127881;" : "No to-dos yet"}</div>`}
      ${pool.length > CARD_TODO_LIMIT ? `<button class="card-more" data-action="open-project" data-id="${escHtml(p.id)}">+ ${pool.length - CARD_TODO_LIMIT} more&hellip;</button>` : ""}
    </div>
    <input class="card-add" data-role="card-add" data-pid="${escHtml(p.id)}" placeholder="+ Add a to-do&hellip;">
  </div>`;
}

function renderProjectsOverview() {
  const body = document.getElementById("project-detail-body");
  const q = projectSearchQuery.trim().toLowerCase();
  const matchesQ = p => !q ||
    (p.name || "").toLowerCase().includes(q) ||
    p.todos.some(t => !t.completed && ((t.text || "").toLowerCase().includes(q) || (t.notes || "").toLowerCase().includes(q)));
  const visible = visibleProjects().filter(matchesQ);
  const groups = [
    { title: "AI Projects", items: visible.filter(p => p.ai) },
    { title: "Work", items: visible.filter(p => !p.personal && !p.ai) },
    { title: "Personal", items: visible.filter(p => p.personal && !p.ai) }
  ].filter(g => g.items.length);

  body.innerHTML = `
    <div class="page-title">Projects</div>
    <div class="page-subtitle">${visible.length} ${statusFilter === "all" ? "" : statusFilter.toLowerCase() + " "}project${visible.length === 1 ? "" : "s"}</div>
    <div class="proj-search">
      <span class="magnifier">&#128269;</span>
      <input id="project-search-input" type="search" placeholder="Search projects &amp; to-dos&hellip;" autocomplete="off">
    </div>
    ${groups.map(g => `
      <div class="ov-group">${g.title}</div>
      <div class="cards-grid">${g.items.map(p => projectCardHtml(p, q)).join("")}</div>`).join("") ||
      `<div class="empty-note">${q ? "No projects or to-dos match your search." :
        `No ${statusFilter === "all" ? "" : statusFilter.toLowerCase() + " "}projects. Create one with <b>+ New</b>.`}</div>`}`;

  const si = document.getElementById("project-search-input");
  if (si) si.value = projectSearchQuery;
}

function renderProjectsMain() {
  document.getElementById("page-project-detail").classList.toggle("page-wide", projectsOverview);
  if (projectsOverview) renderProjectsOverview();
  else renderProjectDetail();
}

/* ---------- rendering: project detail ---------- */

function ptodoRowHtml(p, t) {
  const notesOpen = expandedPtodoNotes.has(t.id);
  const hasNotes = !!(t.notes && t.notes.trim());
  const editing = editingPtodoId !== null && String(editingPtodoId) === String(t.id);
  const metaBits = [];
  if (hasNotes && !notesOpen) metaBits.push(`<span class="note-preview">&#128221; ${escHtml(t.notes.split("\n")[0].slice(0, 80))}</span>`);
  const body = editing
    ? `<input class="task-edit-input" id="ptodo-edit-input" value="${escHtml(t.text)}" data-id="${escHtml(t.id)}">`
    : `<span class="task-text">${escHtml(t.text)}</span>
      ${metaBits.length ? `<div class="task-meta">${metaBits.join("")}</div>` : ""}
      ${notesOpen ? `<textarea class="notes-area" data-role="ptodo-notes" data-id="${escHtml(t.id)}" placeholder="Notes&hellip;">${escHtml(t.notes || "")}</textarea>` : ""}`;
  if (deleteMode === "ptodos") {
    const marked = deleteSelection.has(String(t.id));
    return `<div class="ptodo-row ${t.completed ? "done" : ""}">
      <div class="checkbox select-box ${marked ? "checked" : ""}" data-action="toggle-select" data-id="${escHtml(t.id)}"></div>
      <div class="task-body"><span class="task-text">${escHtml(t.text)}</span></div>
    </div>`;
  }

  return `<div class="ptodo-row ${t.completed ? "done" : ""}">
    <div class="checkbox ${t.completed ? "checked" : ""}" data-action="toggle-ptodo" data-id="${escHtml(t.id)}"></div>
    <div class="task-body">${body}</div>
    <button class="pill clickable ${URGENCY_PILL[t.urgency]}" title="Click to change urgency"
      data-action="cycle-urgency" data-id="${escHtml(t.id)}">${t.urgency[0].toUpperCase() + t.urgency.slice(1)}</button>
    <div class="task-actions">
      <button class="icon-btn" data-action="toggle-ptodo-notes" data-id="${escHtml(t.id)}">${notesOpen ? "Hide" : (hasNotes ? "Note" : "+ Note")}</button>
      <button class="icon-btn" data-action="edit-ptodo" data-id="${escHtml(t.id)}">Edit</button>
    </div>
  </div>`;
}

function renderProjectDetail() {
  const body = document.getElementById("project-detail-body");
  let p = findProject(activeProjectId);
  if (!p || p.isTemplate) {
    p = visibleProjects()[0] || projects.find(x => !x.isTemplate);
    activeProjectId = p ? p.id : null;
  }
  if (!p) {
    body.innerHTML = `<div class="empty-note">No projects yet. Create one with <b>+ New</b>.</div>`;
    return;
  }

  const { total, done } = projectStats(p);
  const open = p.todos.filter(t => !t.completed);
  const finished = p.todos.filter(t => t.completed);
  const urgencySorted = [...open].sort((a, b) =>
    ({ high: 0, medium: 1, low: 2 }[a.urgency] - { high: 0, medium: 1, low: 2 }[b.urgency]));

  body.innerHTML = `
    <div class="detail-head">
      <input class="detail-title-input" id="detail-name" placeholder="Untitled" value="${escHtml(p.name)}">
      <div class="menu-wrap">
        <button class="icon-btn" data-action="toggle-menu" title="More options">&#8943;</button>
        <div class="menu">
          <button data-action="archive-project" data-id="${escHtml(p.id)}">${p.archived ? "&#8617; Unarchive project" : "&#128230; Archive project"}</button>
          <button class="danger" data-action="start-delete" data-scope="ptodos">Delete to-dos&hellip;</button>
        </div>
      </div>
    </div>

    <button class="props-toggle ${detailPropsOpen ? "open" : ""}" data-action="toggle-props" type="button">
      <span class="props-caret">&#9662;</span>
      Details
      <span class="pill ${STATUS_PILL[p.status] || "pill-gray"}">${escHtml(p.status)}</span>
      ${p.due ? `<span class="p-due">&#128197; ${escHtml(formatDue(p.due))}</span>` : ""}
      <span class="p-count">${done}/${total}</span>
    </button>

    ${detailPropsOpen ? `<div class="props">
      <div class="prop-row">
        <div class="prop-label">&#9881;&#65039; Status</div>
        <div class="prop-value">
          <select id="detail-status">
            ${["Active", "Paused", "Done"].map(s => `<option ${p.status === s ? "selected" : ""}>${s}</option>`).join("")}
          </select>
          <span class="pill ${STATUS_PILL[p.status] || "pill-gray"}">${escHtml(p.status)}</span>
        </div>
      </div>
      <div class="prop-row">
        <div class="prop-label">&#127968; Area</div>
        <div class="prop-value">
          <select id="detail-area">
            <option value="work" ${!p.ai && !p.personal ? "selected" : ""}>Work</option>
            <option value="personal" ${!p.ai && p.personal ? "selected" : ""}>Personal</option>
            <option value="ai" ${p.ai ? "selected" : ""}>AI Projects</option>
          </select>
        </div>
      </div>
      <div class="prop-row">
        <div class="prop-label">&#128197; Due</div>
        <div class="prop-value"><input type="date" id="detail-due" value="${escHtml(p.due || "")}"></div>
      </div>
      <div class="prop-row">
        <div class="prop-label">&#9989; Progress</div>
        <div class="prop-value">
          <div class="p-bar" style="max-width:140px"><div class="p-bar-fill" style="width:${total ? Math.round(done / total * 100) : 0}%"></div></div>
          <span class="p-count">${done}/${total}</span>
        </div>
      </div>
    </div>` : ""}

    <textarea class="detail-notes" id="detail-notes" placeholder="Add project notes&hellip;" rows="1">${escHtml(p.notes || "")}</textarea>

    <hr class="divider">

    ${deleteMode === "ptodos" ? deleteBarHtml() : `<form class="quick-add" id="ptodo-add-form">
      <span class="plus">+</span>
      <input type="text" id="ptodo-add-input" placeholder="Add a to-do&hellip;" autocomplete="off">
      <select id="ptodo-add-urgency">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button class="add-btn" type="submit">Add</button>
    </form>`}

    ${urgencySorted.map(t => ptodoRowHtml(p, t)).join("") ||
      `<div class="empty-note">No open to-dos${finished.length ? " &mdash; everything is done &#127881;" : ". Add one above."}</div>`}

    ${finished.length ? `
      <div class="section ${collapsedSections.has("detail-completed") ? "collapsed" : ""}">
        <div class="section-header" data-action="toggle-section" data-section="detail-completed">
          <span class="section-caret">&#9662;</span>
          <span class="section-title">Completed</span>
          <span class="section-count">${finished.length}</span>
        </div>
        <div class="section-body">${finished.map(t => ptodoRowHtml(p, t)).join("")}</div>
      </div>` : ""}

    <div class="danger-zone">
      <button class="danger-link" data-action="delete-project" data-id="${escHtml(p.id)}">Delete project&hellip;</button>
    </div>`;

  autosizeNotes();
  const form = document.getElementById("ptodo-add-form");
  if (form) form.addEventListener("submit", e => {
    e.preventDefault();
    addProjectTodo();
  });
}

function autosizeNotes() {
  const el = document.getElementById("detail-notes");
  if (!el) return;
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
}

/* ---------- rendering: personal entries ---------- */

function formatEntryDate(raw) {
  if (!raw) return "";
  const d = new Date(raw);
  if (Number.isNaN(d.getTime())) return String(raw);
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

function renderEntriesList() {
  const list = document.getElementById("entries-list");
  // keep the real personalItems index on each row so selection still works
  const shown = personalItems
    .map((item, i) => ({ item, i }))
    .filter(({ item }) => Boolean(item.archived) === showArchivedNotes);
  document.getElementById("entries-count").textContent = shown.length ? `· ${shown.length}` : "";
  document.getElementById("notes-active-tab").classList.toggle("current", !showArchivedNotes);
  document.getElementById("notes-archived-tab").classList.toggle("current", showArchivedNotes);
  if (!shown.length) {
    list.innerHTML = `<div class="empty-note">${showArchivedNotes ? "No archived notes." : "No entries yet."}</div>`;
    return;
  }
  list.innerHTML = shown.map(({ item, i }) => `
    <div class="entry-item ${i === selectedEntryIndex ? "selected" : ""}" data-action="select-entry" data-idx="${i}">
      <div class="entry-item-title ${item.title ? "" : "untitled"}">${escHtml(item.title || "Untitled")}</div>
      <div class="entry-item-date">${escHtml(formatEntryDate(item.updatedAt || item.createdAt))}</div>
    </div>`).join("");
}

function renderEntryDetail() {
  const detail = document.getElementById("entry-detail");
  const item = personalItems[selectedEntryIndex];
  if (!item) {
    detail.innerHTML = `<div class="empty-note">Select an entry, or create one with <b>+ New</b>.</div>`;
    return;
  }
  detail.innerHTML = `
    <input class="entry-title-input" data-role="entry-title" placeholder="Untitled" value="${escHtml(item.title || "")}">
    <div class="entry-detail-date">${escHtml(formatEntryDate(item.createdAt))}${item.updatedAt ? " &middot; edited " + escHtml(formatEntryDate(item.updatedAt)) : ""}</div>
    <div class="entry-toolbar">
      <button class="icon-btn" data-action="fmt" data-cmd="bold"><b>B</b></button>
      <button class="icon-btn" data-action="fmt" data-cmd="italic"><i>I</i></button>
      <button class="icon-btn" data-action="fmt" data-cmd="strikeThrough"><s>S</s></button>
      <button class="icon-btn" data-action="fmt" data-cmd="insertUnorderedList">&bull; List</button>
      <button class="icon-btn" data-action="fmt" data-cmd="insertOrderedList">1. List</button>
      <button class="icon-btn" data-action="checklist">&#9745; Check</button>
      <button class="icon-btn" data-action="fmt" data-cmd="removeFormat">Clear</button>
      <div class="controls-spacer"></div>
      <div class="menu-wrap">
        <button class="icon-btn" data-action="toggle-menu" title="More options">&#8943;</button>
        <div class="menu">
          <button data-action="archive-entry">${item.archived ? "&#8617; Unarchive" : "&#128230; Archive"}</button>
          <button class="danger" data-action="delete-entry">Delete&hellip;</button>
        </div>
      </div>
    </div>
    <div class="entry-body" data-role="entry-body" contenteditable="true">${item.body || ""}</div>`;
}

// first personalItems index whose archived state matches the current view (or -1)
function firstVisibleNoteIndex() {
  return personalItems.findIndex(item => Boolean(item.archived) === showArchivedNotes);
}

function renderPersonal() {
  // keep the selection on an entry that belongs to the current (active/archived) view
  const sel = personalItems[selectedEntryIndex];
  if (!sel || Boolean(sel.archived) !== showArchivedNotes) selectedEntryIndex = firstVisibleNoteIndex();
  renderEntriesList();
  renderEntryDetail();
}

function newEntry() {
  personalItems.unshift({ title: "", body: "", createdAt: new Date().toLocaleString() });
  selectedEntryIndex = 0;
  queueSave();
  renderPersonal();
  renderNav();
  document.querySelector('[data-role="entry-title"]')?.focus();
}

function deleteEntry() {
  const item = personalItems[selectedEntryIndex];
  if (!item) return;
  if (!confirm(`Delete "${item.title || "Untitled"}"? This can't be undone.`)) return;
  personalItems.splice(selectedEntryIndex, 1);
  selectedEntryIndex = 0;
  queueSave();
  renderPersonal();
  renderNav();
  showToast("Entry deleted");
}

function archiveEntry() {
  const item = personalItems[selectedEntryIndex];
  if (!item) return;
  item.archived = !item.archived;
  item.updatedAt = new Date().toLocaleString();
  queueSave();
  showToast(item.archived ? "Note archived" : "Note unarchived");
  // the note just left the current view; move selection to a visible one
  selectedEntryIndex = firstVisibleNoteIndex();
  renderPersonal();
  renderNav();
}

/* ---------- render dispatcher ---------- */

function render() {
  renderNav();
  if (view === "tasks") renderTasks();
  if (view === "projects") { renderProjectsMain(); renderProjectsSidebar(); }
  if (view === "personal") renderPersonal();
}

/* ---------- actions: tasks ---------- */

function toggleTask(key) {
  if (completed[key]) delete completed[key];
  else completed[key] = true;
  queueSave();
  render();
}

function saveTaskEdit(input) {
  const key = input.dataset.key;
  const val = input.value.trim();
  if (val) edits[key] = val;
  editingTaskKey = null;
  queueSave();
  render();
}

function startDeleteMode(scope) {
  deleteMode = scope;
  deleteSelection = new Set();
  editingTaskKey = null;
  editingPtodoId = null;
  render();
}

function cancelDeleteMode() {
  deleteMode = null;
  deleteSelection = new Set();
  render();
}

function confirmBulkDelete() {
  const n = deleteSelection.size;
  if (!n) { showToast("Nothing selected"); return; }
  if (!confirm(`Delete ${n} item${n === 1 ? "" : "s"}? This can't be undone.`)) return;
  if (deleteMode === "tasks") {
    deleteSelection.forEach(k => { deleted[k] = true; });
  }
  if (deleteMode === "ptodos") {
    const p = findProject(activeProjectId);
    if (p) {
      p.todos = p.todos.filter(t => !deleteSelection.has(String(t.id)));
      touchProject(p);
    }
  }
  queueSave();
  showToast(`Deleted ${n} item${n === 1 ? "" : "s"}`);
  deleteMode = null;
  deleteSelection = new Set();
  render();
}

async function addInboxTask() {
  const input = document.getElementById("new-task-input");
  const priority = document.getElementById("new-task-priority").value;
  const task = input.value.trim();
  if (!task) { input.focus(); return; }

  const now = new Date();
  const hh = ((now.getHours() + 11) % 12) + 1;
  const added = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ` +
    `${String(hh).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")} ${now.getHours() >= 12 ? "PM" : "AM"}`;

  inboxItems.push({ task, priority, added });
  input.value = "";
  taskFilter = "active";
  syncFilterTabs();
  render();
  showToast("Task added");

  try {
    const res = await fetch("/api/add-task", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ task, priority })
    });
    if (res.ok) { await loadInbox(); render(); }
    else showToast("Added here, but server sync failed");
  } catch (e) {
    showToast("Added here, but server is offline");
  }
}

function syncFilterTabs() {
  document.querySelectorAll('[data-action="filter"]').forEach(el =>
    el.classList.toggle("current", el.dataset.filter === taskFilter));
}

/* ---------- actions: assign to project ---------- */

function openPicker(key) {
  pickerKeys = [key];
  const sections = getAllSections();
  const [sectionId, idxStr] = splitKey(key);
  const section = sections.find(s => s.id === sectionId);
  const text = edits[key] || (section ? section.items[Number(idxStr)] : "") || "";
  document.getElementById("picker-sub").textContent = text.slice(0, 80);

  const choices = projects.filter(p => !p.isTemplate && !p.archived && (p.status || "Active") !== "Done");
  document.getElementById("picker-list").innerHTML = choices.length
    ? choices.map(p => `<button class="modal-option" data-action="picker-choose" data-id="${escHtml(p.id)}">
        <span>&#128193;</span> ${escHtml(p.name || "Untitled")}
        <span class="pill ${STATUS_PILL[p.status] || "pill-gray"}" style="margin-left:auto">${escHtml(p.status)}</span>
      </button>`).join("")
    : `<div class="empty-note">No projects yet &mdash; create one first.</div>`;
  document.getElementById("picker-overlay").classList.add("open");
}

function splitKey(key) {
  const i = key.lastIndexOf("::");
  return [key.slice(0, i), key.slice(i + 2)];
}

function pickerChoose(projectId) {
  const p = findProject(projectId);
  if (!p) return;
  const sections = getAllSections();
  pickerKeys.forEach(key => {
    const [sectionId, idxStr] = splitKey(key);
    const section = sections.find(s => s.id === sectionId);
    const text = (edits[key] || (section ? section.items[Number(idxStr)] : "") || "").trim();
    if (!text) return;
    const dup = p.todos.some(t => t.text.trim().toLowerCase() === text.toLowerCase());
    if (!dup) {
      p.todos.unshift({ id: uid("pt"), text, completed: false, urgency: "medium", createdAt: new Date().toISOString(), notes: notes[key] || "" });
    }
    deleted[key] = true;  // remove from task list once it lives in the project
  });
  touchProject(p);
  closePicker();
  queueSave();
  render();
  showToast(`Moved to ${p.name || "Untitled"}`);
}

function closePicker() {
  pickerKeys = [];
  document.getElementById("picker-overlay").classList.remove("open");
}

/* ---------- actions: projects ---------- */

function newProject() {
  const p = {
    id: uid("p"), name: "", status: "Active", owner: "", due: "", notes: "",
    personal: false, todos: [], isTemplate: false,
    createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
  };
  projects.unshift(p);
  activeProjectId = p.id;
  setOverview(false);
  queueSave();
  setView("projects");

}

/* ---------- new task dialog ---------- */

function openNewTaskDialog() {
  const sel = document.getElementById("newtask-project");
  const order = { Active: 0, Paused: 1, Done: 2 };
  const pool = projects.filter(p => !p.isTemplate && !p.archived)
    .slice()
    .sort((a, b) => (order[a.status || "Active"] ?? 3) - (order[b.status || "Active"] ?? 3));
  sel.innerHTML = pool.map(p =>
    `<option value="${escHtml(p.id)}">${escHtml(p.name || "Untitled")}${(p.status || "Active") === "Active" ? "" : ` (${escHtml(p.status)})`}</option>`
  ).join("") + `<option value="__new__">+ New project&hellip;</option>`;
  if (!projectsOverview && activeProjectId && findProject(activeProjectId)) sel.value = String(activeProjectId);
  document.getElementById("newtask-name").value = "";
  document.getElementById("newtask-projname").value = "";
  document.getElementById("newtask-projname").style.display = sel.value === "__new__" ? "" : "none";
  document.getElementById("newtask-overlay").classList.add("open");
  document.getElementById("newtask-name").focus();
}

function closeNewTaskDialog() {
  document.getElementById("newtask-overlay").classList.remove("open");
}

function submitNewTask() {
  const nameInput = document.getElementById("newtask-name");
  const text = nameInput.value.trim();
  if (!text) { nameInput.focus(); return; }
  const choice = document.getElementById("newtask-project").value;
  let p;
  if (choice === "__new__") {
    const projInput = document.getElementById("newtask-projname");
    const pname = projInput.value.trim();
    if (!pname) { projInput.focus(); return; }
    p = {
      id: uid("p"), name: pname, status: "Active", owner: "", due: "", notes: "",
      personal: false, todos: [], isTemplate: false,
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
    };
    projects.unshift(p);
  } else {
    p = findProject(choice);
  }
  if (!p) return;
  p.todos.unshift({ id: uid("pt"), text, completed: false, urgency: "medium", createdAt: new Date().toISOString(), notes: "" });
  touchProject(p);
  queueSave();
  closeNewTaskDialog();
  render();
  showToast(`Added to ${p.name || "Untitled"}`);
}

function deleteProject(id) {
  const p = findProject(id);
  if (!p) return;
  const label = p.name || "Untitled";
  if (!confirm(`Delete "${label}" and its ${p.todos.length} to-do(s)? This can't be undone.`)) return;
  projects = projects.filter(x => String(x.id) !== String(id));
  activeProjectId = null;
  queueSave();
  setView("projects");
  showToast(`Deleted ${label}`);
}

function archiveProject(id) {
  const p = findProject(id);
  if (!p) return;
  p.archived = !p.archived;
  touchProject(p);
  queueSave();
  if (p.archived) {
    // archived projects leave the normal view — drop to the overview grid
    setOverview(true);
    setView("projects");
    showToast(`Archived ${p.name || "Untitled"}`);
  } else {
    render();
    showToast(`Unarchived ${p.name || "Untitled"}`);
  }
}

/* ---------- event delegation ---------- */

document.addEventListener("click", e => {
  const el = e.target.closest("[data-action]");
  if (!el) return;
  const a = el.dataset.action;

  if (a === "nav") setView(el.dataset.view);
  if (a === "filter") { taskFilter = el.dataset.filter; syncFilterTabs(); renderTasks(); }
  if (a === "status-filter") {
    statusFilter = el.dataset.status;
    renderProjectsSidebar();
    if (projectsOverview) renderProjectsMain();
  }
  if (a === "overview") { setOverview(true); renderProjectsMain(); renderProjectsSidebar(); }
  if (a === "toggle-card-todo") toggleCardTodo(el.dataset.pid, el.dataset.tid);
  if (a === "toggle-section") {
    const id = el.dataset.section;
    if (collapsedSections.has(id)) collapsedSections.delete(id);
    else collapsedSections.add(id);
    try { localStorage.setItem(UI_COLLAPSED_KEY, JSON.stringify([...collapsedSections])); } catch (err) {}
    const sectionEl = el.closest(".section");
    if (sectionEl) sectionEl.classList.toggle("collapsed");
  }
  if (a === "toggle-task") toggleTask(el.dataset.key);
  if (a === "edit-task") { editingTaskKey = el.dataset.key; renderTasks(); }
  if (a === "toggle-menu") {
    const menu = el.closest(".menu-wrap").querySelector(".menu");
    const wasOpen = menu.classList.contains("open");
    document.querySelectorAll(".menu.open").forEach(m => m.classList.remove("open"));
    if (!wasOpen) menu.classList.add("open");
  }
  if (a === "start-delete") {
    document.querySelectorAll(".menu.open").forEach(m => m.classList.remove("open"));
    startDeleteMode(el.dataset.scope);
  }
  if (a === "archive-project") {
    document.querySelectorAll(".menu.open").forEach(m => m.classList.remove("open"));
    archiveProject(el.dataset.id);
  }
  if (a === "toggle-select") {
    const k = el.dataset.key || el.dataset.id;
    if (deleteSelection.has(k)) deleteSelection.delete(k);
    else deleteSelection.add(k);
    if (deleteMode === "tasks") renderTasks(); else renderProjectDetail();
  }
  if (a === "cancel-delete-mode") cancelDeleteMode();
  if (a === "confirm-bulk-delete") confirmBulkDelete();
  if (a === "toggle-notes") {
    const key = el.dataset.key;
    if (expandedNotes.has(key)) expandedNotes.delete(key);
    else expandedNotes.add(key);
    renderTasks();
    const area = document.querySelector(`.notes-area[data-key="${CSS.escape(key)}"]`);
    if (area) area.focus();
  }
  if (a === "assign-project") openPicker(el.dataset.key);
  if (a === "picker-cancel") closePicker();
  if (a === "picker-choose") pickerChoose(el.dataset.id);

  if (a === "new-entry") newEntry();
  if (a === "delete-entry") deleteEntry();
  if (a === "archive-entry") archiveEntry();
  if (a === "toggle-archived-notes") {
    showArchivedNotes = el.dataset.show === "true";
    selectedEntryIndex = firstVisibleNoteIndex();
    renderPersonal();
  }
  if (a === "select-entry") {
    const idx = Number(el.dataset.idx);
    if (idx !== selectedEntryIndex) { selectedEntryIndex = idx; renderPersonal(); }
  }
  if (a === "fmt") {
    document.execCommand(el.dataset.cmd, false, null);
    const body = document.querySelector('[data-role="entry-body"]');
    if (body) {
      const item = personalItems[selectedEntryIndex];
      if (item) { item.body = body.innerHTML; item.updatedAt = new Date().toLocaleString(); queueSave(); }
    }
  }
  if (a === "checklist") {
    const body = document.querySelector('[data-role="entry-body"]');
    if (body) {
      body.focus();
      // find the <ul> the caret sits in; make one if there isn't a list yet
      let ul = enclosingTag("UL");
      if (!enclosingTag("UL") && !enclosingTag("OL")) {
        document.execCommand("insertUnorderedList", false, null);
        ul = enclosingTag("UL");
      }
      if (ul) ul.classList.toggle("checklist");  // toggle between bullets and tick-boxes
      const item = personalItems[selectedEntryIndex];
      if (item) { item.body = body.innerHTML; item.updatedAt = new Date().toLocaleString(); queueSave(); }
    }
  }

  if (a === "toggle-props") { detailPropsOpen = !detailPropsOpen; renderProjectDetail(); }
  if (a === "new-project") openNewTaskDialog();
  if (a === "newtask-cancel") closeNewTaskDialog();
  if (a === "open-project") { setOverview(false); activeProjectId = el.dataset.id; setView("projects"); }
  if (a === "open-card-todo") {
    setOverview(false);
    activeProjectId = el.dataset.pid;
    expandedPtodoNotes.add(el.dataset.tid);
    setView("projects");
    const area = document.querySelector(`.notes-area[data-id="${CSS.escape(el.dataset.tid)}"]`);
    if (area) { area.scrollIntoView({ block: "center" }); area.focus(); }
  }
  if (a === "delete-project") deleteProject(el.dataset.id);
  if (a === "toggle-ptodo") toggleProjectTodo(el.dataset.id);
  if (a === "cycle-urgency") cycleUrgency(el.dataset.id);
  if (a === "edit-ptodo") {
    editingPtodoId = el.dataset.id;
    renderProjectDetail();
    const input = document.getElementById("ptodo-edit-input");
    if (input) { input.focus(); input.setSelectionRange(input.value.length, input.value.length); }
  }
  if (a === "toggle-ptodo-notes") {
    const id = el.dataset.id;
    if (expandedPtodoNotes.has(id)) expandedPtodoNotes.delete(id);
    else expandedPtodoNotes.add(id);
    renderProjectDetail();
    const area = document.querySelector(`.notes-area[data-id="${CSS.escape(id)}"]`);
    if (area) area.focus();
  }
});

document.addEventListener("click", e => {

  if (!li) return;

  li.classList.toggle("checked");

  if (item && body) { item.body = body.innerHTML; item.updatedAt = new Date().toLocaleString(); queueSave(); }

/* find the nearest ancestor of a given tag from the caret, within the note editor */
function enclosingTag(tag) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  const body = document.querySelector('[data-role="entry-body"]');
  let node = sel.anchorNode;
  while (node && node !== body) {
    if (node.nodeName === tag) return node;
    node = node.parentNode;
  }
  return null;
}

/* inputs that live inside re-rendered HTML */
/* Markdown-style: typing "- " or "* " at the start of a line in a Long Note
   turns that line into a bullet list. */
function maybeBulletAutoformat(body) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (!range.collapsed) return;
  const node = range.startContainer;
  if (node.nodeType !== Node.TEXT_NODE) return;
  if (node.parentElement && node.parentElement.closest("li")) return; // already in a list
  const before = node.textContent.slice(0, range.startOffset);
  if (!/^[-*][\s ]$/.test(before)) return;  // line is just "- " / "* "
  // strip the "- " marker, then convert the line to a bullet
  const r = document.createRange();
  r.setStart(node, 0);
  r.setEnd(node, range.startOffset);
  r.deleteContents();
  const caret = document.createRange();
  caret.setStart(node, 0);
  caret.collapse(true);
  sel.removeAllRanges();
  sel.addRange(caret);
  document.execCommand("insertUnorderedList", false, null);
}

});

document.addEventListener("keydown", e => {
  const el = e.target;
  if (el.dataset && el.dataset.role === "card-add" && e.key === "Enter") {
    e.preventDefault();
    addCardTodo(el.dataset.pid, el);
  }
  if (el.dataset && el.dataset.role === "entry-body" && e.key === "Tab") {
    // Tab nests the current bullet into a sub-bullet; Shift+Tab pulls it back out.
    e.preventDefault();
    document.execCommand(e.shiftKey ? "outdent" : "indent", false, null);
    const item = personalItems[selectedEntryIndex];
    if (item) { item.body = el.innerHTML; item.updatedAt = new Date().toLocaleString(); queueSave(); }
  }
  if (el.id === "edit-input") {
    if (e.key === "Enter") { e.preventDefault(); saveTaskEdit(el); }
    if (e.key === "Escape") { editingTaskKey = null; renderTasks(); }
  }
  if (el.id === "ptodo-edit-input") {
    if (e.key === "Enter") { e.preventDefault(); savePtodoEdit(el); }
    if (e.key === "Escape") { editingPtodoId = null; renderProjectDetail(); }
  }
  if (e.key === "Escape" && deleteMode) cancelDeleteMode();
  if (e.key === "Escape" && document.getElementById("picker-overlay").classList.contains("open")) closePicker();
  if (e.key === "Escape" && document.getElementById("newtask-overlay").classList.contains("open")) closeNewTaskDialog();
});

document.addEventListener("focusout", e => {
  if (e.target.id === "edit-input" && editingTaskKey) saveTaskEdit(e.target);
  if (e.target.id === "ptodo-edit-input" && editingPtodoId !== null) savePtodoEdit(e.target);
});

document.getElementById("quick-add-form").addEventListener("submit", e => {
  e.preventDefault();
  addInboxTask();
});

/* ---------- init ---------- */

async function init() {
  await Promise.all([loadRemoteState(), loadInbox()]);
  routeInboxItems();
  const lastView = localStorage.getItem(UI_VIEW_KEY) || "tasks";
  const lastProject = localStorage.getItem(UI_PROJECT_KEY);
  if (lastView === "projects" || lastView === "detail") {
    if (lastProject && findProject(lastProject)) activeProjectId = lastProject;
    setView("projects");
  } else if (lastView === "personal") {
    setView("personal");
  } else {
    setView("tasks");
  }
}

init();
setInterval(async () => {
  await loadInbox();
  const filed = routeInboxItems();
  if (view === "tasks" || filed) render(); else renderNav();
}, INBOX_POLL_MS);
</script>
</body>
</html>
